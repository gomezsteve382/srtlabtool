name: Verify CDA Reproducibility

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify-cda-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run CDA reproducibility verifier
        run: node ./verify-cda-repro.mjs --root ./cda_extracted --json --out ./verify-cda-report.json

      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-cda-report
          path: ./verify-cda-report.json
